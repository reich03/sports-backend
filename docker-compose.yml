version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: master-sport-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: master_sport_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database_seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - master-sport-network

  # Backend API
  backend:
    build: .
    container_name: master-sport-backend
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=master_sport_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - JWT_SECRET=master_sport_secret_key_2026_dev
      - JWT_EXPIRE=7d
      - EMAIL_HOST=smtp.gmail.com
      - EMAIL_PORT=587
      - EMAIL_USER=redjhojan0319@gmail.com
      - EMAIL_PASSWORD=pzfi yrun ttte djbr
      - EMAIL_FROM=noreply@mastersport.app
      - FRONTEND_URL=http://localhost:19006
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
    networks:
      - master-sport-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  master-sport-network:
    driver: bridge
